name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_call:
    inputs:
      skip-debug-apk:
        description: 'Skip debug APK build (used by release pipeline)'
        type: boolean
        default: false
        required: false

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FLUTTER_VERSION: '3.41.9'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Stage 1 ──────────────────────────────────────────────────────────────────
  format:
    name: Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crosscue

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.16.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

  # ── Stage 2 (parallel, gated on format) ──────────────────────────────────────
  analyze:
    name: Analyze
    needs: format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crosscue

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.16.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

  test:
    name: Test
    needs: format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crosscue

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.16.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Test
        run: flutter test

  generated:
    name: Generated files
    needs: format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crosscue

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.16.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify generated files are current
        run: |
          dart run build_runner build
          git diff --exit-code

  # ── Stage 3 (gated on all stage 2 jobs) ──────────────────────────────────────
  # Skipped when called from release.yml — the release job builds a signed APK instead.
  build-debug-apk:
    name: Build debug APK
    if: ${{ !inputs.skip-debug-apk }}
    needs: [analyze, test, generated]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crosscue

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.16.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug --no-pub
