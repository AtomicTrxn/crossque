name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_call:
    inputs:
      skip-debug-apk:
        description: 'Skip debug APK build (used by release pipeline)'
        type: boolean
        default: false
        required: false

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FLUTTER_VERSION: '3.41.9'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Stage 1 ──────────────────────────────────────────────────────────────────
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crosscue

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.0
        with:
          fetch-depth: 0

      - name: Detect relevant changes
        id: changes
        working-directory: .
        run: |
          if [ "${{ github.event_name }}" = "workflow_call" ]; then
            echo "app=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}"
          if git diff --quiet "$BASE_SHA" "$GITHUB_SHA" -- \
            crosscue .github/workflows Makefile scripts; then
            echo "app=false" >> "$GITHUB_OUTPUT"
          else
            echo "app=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Flutter
        if: steps.changes.outputs.app == 'true'
        uses: subosito/flutter-action@v2.16.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        if: steps.changes.outputs.app == 'true'
        run: flutter pub get

      - name: Verify formatting
        if: steps.changes.outputs.app == 'true'
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        if: steps.changes.outputs.app == 'true'
        run: flutter analyze

      - name: Verify generated files are current
        if: steps.changes.outputs.app == 'true'
        run: |
          dart run build_runner build
          git diff --exit-code

      - name: No app changes
        if: steps.changes.outputs.app != 'true'
        run: echo "No app-affecting changes; static checks not needed."

  # ── Stage 2 (parallel with static checks) ────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crosscue

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.0
        with:
          fetch-depth: 0

      - name: Detect relevant changes
        id: changes
        working-directory: .
        run: |
          if [ "${{ github.event_name }}" = "workflow_call" ]; then
            echo "app=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}"
          if git diff --quiet "$BASE_SHA" "$GITHUB_SHA" -- \
            crosscue .github/workflows Makefile scripts; then
            echo "app=false" >> "$GITHUB_OUTPUT"
          else
            echo "app=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Flutter
        if: steps.changes.outputs.app == 'true'
        uses: subosito/flutter-action@v2.16.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        if: steps.changes.outputs.app == 'true'
        run: flutter pub get

      - name: Test
        if: steps.changes.outputs.app == 'true'
        run: flutter test

      - name: No app changes
        if: steps.changes.outputs.app != 'true'
        run: echo "No app-affecting changes; tests not needed."

  # ── Stage 3 (gated on all stage 2 jobs) ──────────────────────────────────────
  # Disabled on regular pull_request/push CI so PRs only run checks.
  # Reusable workflow callers can opt in by passing skip-debug-apk: false.
  build-debug-apk:
    name: Build debug APK
    if: ${{ github.event_name == 'workflow_call' && inputs.skip-debug-apk == false }}
    needs: [static-checks, test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crosscue

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.16.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug --no-pub
