name: Release

# Default: push a semver tag → signed APK + GitHub Release
# Play Store: use workflow_dispatch with play_store: true → also builds AAB and uploads
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3) — must already exist'
        required: true
      play_store:
        description: 'Build AAB and upload to Play Store'
        type: boolean
        default: false

env:
  FLUTTER_VERSION: '3.41.9'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Stage 1: full CI gate ─────────────────────────────────────────────────
  ci:
    name: CI checks
    uses: ./.github/workflows/ci.yml
    with:
      skip-debug-apk: true
    permissions:
      contents: read

  # ── Stage 2: signed release build + GitHub Release ───────────────────────
  release:
    name: Build & publish
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create a GitHub Release

    defaults:
      run:
        working-directory: crosscue

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.0

      - name: Parse version
        id: version
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          IFS='.' read -r major minor patch <<< "$VERSION"
          CODE=$(( major * 10000 + minor * 100 + patch ))
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$CODE"    >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"      >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4.2.1
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.16.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/crosscue-release.jks"

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/crosscue-release.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          flutter build apk \
            --release \
            --no-pub \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ steps.version.outputs.code }}

      # ── Play Store path: build AAB (only when play_store: true) ──────────
      - name: Build release AAB
        if: ${{ inputs.play_store == true }}
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/crosscue-release.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          flutter build appbundle \
            --release \
            --no-pub \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ steps.version.outputs.code }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.0.0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Crosscue v${{ steps.version.outputs.name }}
          generate_release_notes: true
          files: crosscue/build/app/outputs/flutter-apk/app-release.apk

      # ── Play Store upload (only when play_store: true) ────────────────────
      - name: Upload to Play Store — internal track
        if: ${{ inputs.play_store == true }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: dev.tomhess.crosscue
          releaseFiles: crosscue/build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
