name: Release

# Dispatch-only. Tag the commit you want to ship first
# (`git tag vX.Y.Z && git push origin vX.Y.Z`), then run this workflow with
# that tag.
#
# Per dispatch: `android` and `ios` build jobs run in parallel; once both
# finish, `github_release` publishes a GitHub Release with just the APK
# attached. iOS always builds (verification only); set test_flight: true
# to additionally upload the IPA to TestFlight. AAB → Play Store is gated
# on play_store: true.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3) — must already exist'
        required: true
      play_store:
        description: 'Build AAB and upload to Play Store'
        type: boolean
        default: false
      track:
        description: 'Play Store track (only used when play_store: true)'
        type: choice
        default: internal
        options:
          - internal
          - alpha
          - beta
          - production
      test_flight:
        description: 'Upload built IPA to TestFlight (IPA is always built for verification)'
        type: boolean
        default: false

env:
  FLUTTER_VERSION: '3.41.9'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android:
    name: Build Android
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: crosscue

    steps:
      - name: Check out tag
        uses: actions/checkout@v4.2.0
        with:
          ref: ${{ inputs.tag }}

      - name: Parse version
        id: version
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          IFS='.' read -r major minor patch <<< "$VERSION"
          CODE=$(( major * 10000 + minor * 100 + patch ))
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$CODE"    >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"      >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4.2.1
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.16.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/crosscue-release.jks"

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/crosscue-release.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          # No --no-pub: a release build must regenerate
          # GeneratedPluginRegistrant so dev-only plugins (integration_test)
          # are excluded. The stale registrant from `flutter pub get` lists
          # them and breaks compileReleaseJavaWithJavac.
          flutter build apk \
            --release \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ steps.version.outputs.code }}

      - name: Build release AAB
        if: ${{ inputs.play_store == true }}
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/crosscue-release.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          # No --no-pub: see the APK step above — the release build must
          # regenerate GeneratedPluginRegistrant to drop dev-only plugins.
          flutter build appbundle \
            --release \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ steps.version.outputs.code }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: crosscue-android-${{ steps.version.outputs.name }}
          path: crosscue/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload AAB artifact
        if: ${{ inputs.play_store == true }}
        uses: actions/upload-artifact@v4
        with:
          name: crosscue-android-aab-${{ steps.version.outputs.name }}
          path: crosscue/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 30

      - name: Upload to Play Store
        if: ${{ inputs.play_store == true }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: dev.tomhess.crosscue
          releaseFiles: crosscue/build/app/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track }}
          status: completed

  ios:
    name: Build iOS (upload to TestFlight if requested)
    runs-on: macos-latest

    defaults:
      run:
        working-directory: crosscue

    steps:
      - name: Check out tag
        uses: actions/checkout@v4.2.0
        with:
          ref: ${{ inputs.tag }}

      - name: Parse version
        id: version
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          IFS='.' read -r major minor patch <<< "$VERSION"
          CODE=$(( major * 10000 + minor * 100 + patch ))
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$CODE"    >> "$GITHUB_OUTPUT"

      # macos-latest's default Xcode may lag behind the iOS SDK that our
      # plugins compile against (e.g. device_info_plus 12.4.0 references
      # NSProcessInfo.isiOSAppOnVision, iOS 17+). Pin to the newest stable
      # Xcode on the runner to guarantee an SDK that has those symbols.
      - name: Pin Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.16.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Build a one-shot keychain that's discarded with the runner. Importing
      # straight into the default login keychain would leak the cert if the
      # runner image is ever reused.
      - name: Import signing certificate
        env:
          CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
        working-directory: .
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "$CERT_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -P "$CERT_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign -T /usr/bin/security
          # Avoids the "do you want to allow access" prompt during codesign.
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        working-directory: .
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$PROFILE_BASE64" | base64 --decode \
            > "$PROFILE_DIR/release.mobileprovision"

      # Flutter's auto-generated ExportOptions.plist uses automatic signing,
      # which fails on CI (no Apple ID) and can't tell xcodebuild that the
      # installed profile is the iCloud-capable one. Hand it an explicit
      # manual-signing plist that maps the bundle id to the profile.
      - name: Write ExportOptions.plist
        working-directory: .
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>destination</key>
              <string>export</string>
              <key>teamID</key>
              <string>ZS9BL7472D</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>dev.tomhess.crosscue</key>
                  <string>Crosscue App Store</string>
              </dict>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

      - name: Build signed IPA
        run: |
          flutter build ipa \
            --release \
            --no-pub \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ steps.version.outputs.code }} \
            --export-options-plist="$RUNNER_TEMP/ExportOptions.plist"

      # Apple ID + app-specific password is the simplest auth path for altool;
      # an App Store Connect API key would also work but needs an additional
      # secret (issuer ID) we haven't provisioned. --asc-provider disambiguates
      # if the Apple ID has access to multiple teams.
      - name: Upload to TestFlight
        if: ${{ inputs.test_flight == true }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_DEVELOPMENT_TEAM_ID: ${{ secrets.APPLE_DEVELOPMENT_TEAM_ID }}
        run: |
          IPA_PATH=$(ls build/ios/ipa/*.ipa | head -1)
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --username "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --asc-provider "$APPLE_DEVELOPMENT_TEAM_ID"

  github_release:
    name: Publish GitHub Release
    needs: [android, ios]
    # iOS is a verification gate: both jobs must succeed before we publish.
    if: ${{ needs.android.result == 'success' && needs.ios.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create a GitHub Release

    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          pattern: crosscue-android-*
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.0.0
        with:
          tag_name: ${{ inputs.tag }}
          name: Crosscue ${{ inputs.tag }}
          generate_release_notes: true
          # AAB glob matches nothing when play_store: false — softprops/action-gh-release
          # skips missing files silently (fail_on_unmatched_files defaults to false).
          files: |
            artifacts/*.apk
            artifacts/*.aab
