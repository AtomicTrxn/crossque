name: Release

# Dispatch-only. Tag the commit you want to ship first
# (`git tag vX.Y.Z && git push origin vX.Y.Z`), then run this workflow with
# that tag. Each dispatch produces exactly one signed APK + GitHub Release,
# plus an optional signed AAB upload to a Play Store track.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3) — must already exist'
        required: true
      play_store:
        description: 'Build AAB and upload to Play Store'
        type: boolean
        default: false
      track:
        description: 'Play Store track (only used when play_store: true)'
        type: choice
        default: internal
        options:
          - internal
          - alpha
          - beta
          - production

env:
  FLUTTER_VERSION: '3.41.9'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build & publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create a GitHub Release

    defaults:
      run:
        working-directory: crosscue

    steps:
      - name: Check out tag
        uses: actions/checkout@v4.2.0
        with:
          ref: ${{ inputs.tag }}

      - name: Parse version
        id: version
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          IFS='.' read -r major minor patch <<< "$VERSION"
          CODE=$(( major * 10000 + minor * 100 + patch ))
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$CODE"    >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"      >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4.2.1
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.16.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/crosscue-release.jks"

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/crosscue-release.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          flutter build apk \
            --release \
            --no-pub \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ steps.version.outputs.code }}

      - name: Build release AAB
        if: ${{ inputs.play_store == true }}
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/crosscue-release.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          flutter build appbundle \
            --release \
            --no-pub \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ steps.version.outputs.code }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.0.0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Crosscue v${{ steps.version.outputs.name }}
          generate_release_notes: true
          files: crosscue/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload to Play Store
        if: ${{ inputs.play_store == true }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: dev.tomhess.crosscue
          releaseFiles: crosscue/build/app/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track }}
          status: completed
