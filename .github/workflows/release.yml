name: Release

# Dispatch-only. Tag the commit you want to ship first
# (`git tag vX.Y.Z && git push origin vX.Y.Z`), then run this workflow with
# that tag.
#
# Per dispatch: `android` and `ios` build jobs run in parallel; once both
# finish, `github_release` publishes a single GitHub Release with the APK
# (and IPA, when test_flight is on) attached. Optional uploads on top:
# AAB → Play Store (play_store: true) and IPA → TestFlight (test_flight: true,
# the default).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3) — must already exist'
        required: true
      play_store:
        description: 'Build AAB and upload to Play Store'
        type: boolean
        default: false
      track:
        description: 'Play Store track (only used when play_store: true)'
        type: choice
        default: internal
        options:
          - internal
          - alpha
          - beta
          - production
      test_flight:
        description: 'Build signed IPA and upload to TestFlight'
        type: boolean
        default: true

env:
  FLUTTER_VERSION: '3.41.9'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android:
    name: Build Android
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: crosscue

    steps:
      - name: Check out tag
        uses: actions/checkout@v4.2.0
        with:
          ref: ${{ inputs.tag }}

      - name: Parse version
        id: version
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          IFS='.' read -r major minor patch <<< "$VERSION"
          CODE=$(( major * 10000 + minor * 100 + patch ))
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$CODE"    >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"      >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4.2.1
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.16.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/crosscue-release.jks"

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/crosscue-release.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          flutter build apk \
            --release \
            --no-pub \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ steps.version.outputs.code }}

      - name: Build release AAB
        if: ${{ inputs.play_store == true }}
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/crosscue-release.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          flutter build appbundle \
            --release \
            --no-pub \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ steps.version.outputs.code }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: crosscue-android-${{ steps.version.outputs.name }}
          path: crosscue/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload to Play Store
        if: ${{ inputs.play_store == true }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: dev.tomhess.crosscue
          releaseFiles: crosscue/build/app/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track }}
          status: completed

  ios:
    name: Build & upload iOS to TestFlight
    if: ${{ inputs.test_flight == true }}
    runs-on: macos-latest

    defaults:
      run:
        working-directory: crosscue

    steps:
      - name: Check out tag
        uses: actions/checkout@v4.2.0
        with:
          ref: ${{ inputs.tag }}

      - name: Parse version
        id: version
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          IFS='.' read -r major minor patch <<< "$VERSION"
          CODE=$(( major * 10000 + minor * 100 + patch ))
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$CODE"    >> "$GITHUB_OUTPUT"

      # macos-latest's default Xcode may lag behind the iOS SDK that our
      # plugins compile against (e.g. device_info_plus 12.4.0 references
      # NSProcessInfo.isiOSAppOnVision, iOS 17+). Pin to the newest stable
      # Xcode on the runner to guarantee an SDK that has those symbols.
      - name: Pin Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.16.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Build a one-shot keychain that's discarded with the runner. Importing
      # straight into the default login keychain would leak the cert if the
      # runner image is ever reused.
      - name: Import signing certificate
        env:
          CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
        working-directory: .
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "$CERT_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -P "$CERT_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign -T /usr/bin/security
          # Avoids the "do you want to allow access" prompt during codesign.
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        working-directory: .
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$PROFILE_BASE64" | base64 --decode \
            > "$PROFILE_DIR/release.mobileprovision"

      - name: Build signed IPA
        run: |
          flutter build ipa \
            --release \
            --no-pub \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ steps.version.outputs.code }} \
            --export-method=app-store

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: crosscue-ios-${{ steps.version.outputs.name }}
          path: crosscue/build/ios/ipa/*.ipa
          if-no-files-found: error
          retention-days: 30

      # Apple ID + app-specific password is the simplest auth path for altool;
      # an App Store Connect API key would also work but needs an additional
      # secret (issuer ID) we haven't provisioned. --asc-provider disambiguates
      # if the Apple ID has access to multiple teams.
      - name: Upload to TestFlight
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_DEVELOPMENT_TEAM_ID: ${{ secrets.APPLE_DEVELOPMENT_TEAM_ID }}
        run: |
          IPA_PATH=$(ls build/ios/ipa/*.ipa | head -1)
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --username "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --asc-provider "$APPLE_DEVELOPMENT_TEAM_ID"

  github_release:
    name: Publish GitHub Release
    needs: [android, ios]
    # Run when Android succeeds and iOS either succeeded or was skipped (e.g.
    # test_flight: false). always() prevents auto-skip when ios is skipped.
    if: ${{ always() && needs.android.result == 'success' && (needs.ios.result == 'success' || needs.ios.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create a GitHub Release

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: crosscue-*
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.0.0
        with:
          tag_name: ${{ inputs.tag }}
          name: Crosscue ${{ inputs.tag }}
          generate_release_notes: true
          # IPA glob is absent when test_flight: false — action skips missing
          # files silently with fail_on_unmatched_files: false (the default).
          files: |
            artifacts/*.apk
            artifacts/*.ipa
