name: crosscue
description: A modern native crossword solver for Android.
publish_to: 'none'

version: 1.2.5+7

environment:
  # Drift 2.31+ already requires Dart 3.5, so this is the real supported floor.
  # Keep the floor below Dart 3.10 until the deferred major upgrades below are
  # intentionally taken together.
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.2

  # Immutable data classes
  freezed_annotation: ^3.1.0

  # Navigation
  go_router: ^17.0.0

  # Local persistence
  # Deferred at 2.31.x: 2.33.x requires the coordinated sqlite3 3.x migration
  # and currently conflicts with the Riverpod generator / Flutter meta pin.
  drift: ^2.20.0
  # Deferred at 0.2.x while drift stays on the current generator-compatible line.
  drift_flutter: ^0.2.0
  # Deferred at 0.5.x: 0.6.0+eol belongs to the sqlite3 3.x migration and
  # currently cannot be taken independently with the existing generator stack.
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # HTTP client (Crosshare downloader)
  dio: ^5.4.0

  # File I/O
  # 11.0.2 includes the Android path-traversal fix and remains Dart 3.4+.
  file_picker: ^11.0.2
  # Deferred at 12.x: 13.x requires Dart 3.10 / Flutter 3.38.1 and conflicts
  # with file_picker 11 through incompatible win32 constraints.
  share_plus: ^12.0.0

  # Puzzle ID generation
  crypto: ^3.0.0

  # Date formatting (streak date strings, .ipuz date parsing)
  intl: ^0.20.0

  # Material You dynamic color
  dynamic_color: ^1.7.0

  # Confetti on puzzle completion
  confetti: ^0.8.0

  # Haptics
  vibration: ^3.0.0

  # In-app feedback beep (generated PCM)
  audioplayers: ^6.6.0

  # Privacy policy / repo links opened in external browser
  url_launcher: ^6.3.2

  # Runtime app version (Settings → About)
  # Deferred at 9.x: 10.x requires Dart 3.10 / Flutter 3.38.1 and conflicts
  # with file_picker 11 through incompatible win32 constraints.
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.0
  freezed: ^3.2.5
  # Deferred with the Drift runtime: 2.33.x currently collides with the
  # Riverpod generator / Flutter meta constraint set.
  drift_dev: ^2.20.0
  riverpod_generator: ^4.0.3

  # Direct sqlite3 access in migration tests (transitive via drift_dev but must
  # be declared explicitly to satisfy depend_on_referenced_packages lint).
  # Deferred at 2.x until the app adopts the sqlite3 3.x / Dart 3.10 line.
  sqlite3: ^2.9.4

  # Linting
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Roboto Mono for grid cell letters (Apache 2.0)
  fonts:
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf
        - asset: assets/fonts/RobotoMono-Bold.ttf
          weight: 700

  assets:
    - assets/fonts/
    - assets/images/ic_launcher.png
