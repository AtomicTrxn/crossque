name: crosscue
description: A modern native crossword solver for Android.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.2

  # Immutable data classes
  freezed_annotation: ^3.1.0

  # Navigation
  go_router: ^14.0.0

  # Local persistence
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # Networking (puzzle source downloaders — Phase 2, but wired now)
  dio: ^5.4.0

  # File formats
  xml: ^6.6.0          # .jpz XML parsing (Phase 2)

  # File I/O
  file_picker: ^8.0.0
  share_plus: ^10.0.0

  # Puzzle ID generation
  crypto: ^3.0.0

  # Date formatting (streak date strings, .ipuz date parsing)
  intl: ^0.19.0

  # Material You dynamic color
  dynamic_color: ^1.7.0

  # Animations
  flutter_animate: ^4.5.0
  confetti: ^0.7.0

  # Haptics
  vibration: ^2.0.0

  # Loading skeletons
  shimmer: ^3.0.0

  # Crash reporting (Sprint 7 — add back when wiring Sentry)
  # sentry_flutter: ^8.0.0

  # Keyboard visibility detection
  flutter_keyboard_visibility: ^6.0.0

  # Local notifications (Phase 2 — uncomment when reminders are scoped in)
  # flutter_local_notifications: ^17.0.0
  # flutter_timezone: ^3.0.0
  # timezone: ^0.9.0

  # IAP (Phase 2 — uncomment when support tiers are scoped in)
  # in_app_purchase: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.0
  freezed: ^3.2.5
  drift_dev: ^2.20.0
  riverpod_generator: ^4.0.3

  # Splash screen generation (run once; not a runtime dep)
  flutter_native_splash: ^2.4.0

  # Linting
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Roboto Mono for grid cell letters (Apache 2.0)
  fonts:
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf
        - asset: assets/fonts/RobotoMono-Bold.ttf
          weight: 700

  assets:
    - assets/fonts/

# flutter_native_splash — run: dart run flutter_native_splash:create
flutter_native_splash:
  color: '#1565C0'
  image: assets/images/splash_icon.png
  android_12:
    color: '#1565C0'
    image: assets/images/splash_icon.png
  fullscreen: false
