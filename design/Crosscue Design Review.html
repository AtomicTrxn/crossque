// Material You nav icons — 24×24 SVG, 1.8px stroke, rounded caps
const NavIcons = {
  Today: (active) => (

      {active ? (
        // Filled grid variant when active
        <>
          <rect x="3" y="3" width="7" height="7" rx="1.5" fill={T.primary} stroke="none"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5" fill={T.primary} stroke="none"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5" fill={T.primary} stroke="none"/>
          <rect x="14" y="14" width="7" height="7" rx="1.5" fill="none" stroke={T.primary} strokeWidth="1.8"/>
        </>
      ) : (
        <>
          <rect x="3" y="3" width="7" height="7" rx="1.5"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/>
          <rect x="14" y="14" width="7" height="7" rx="1.5"/>
        </>
      )}
    </svg>
  ),
  Archive: (active) => (
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={active ? T.primary : T.onSurface3} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <rect x="3" y="4" width="18" height="17" rx="2"/>
      <line x1="3" y1="9" x2="21" y2="9"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      {active && <rect x="7" y="13" width="4" height="4" rx="0.5" fill={T.primary} stroke="none"/>}
      {!active && <rect x="7" y="13" width="4" height="4" rx="0.5"/>}
      <line x1="15" y1="13" x2="17" y2="13" strokeWidth={active ? 2 : 1.8}/>
      <line x1="15" y1="17" x2="17" y2="17" strokeWidth={active ? 2 : 1.8}/>
    </svg>
  ),
  Stats: (active) => (
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" strokeLinecap="round" strokeLinejoin="round">
      <rect x="4" y="13" width="4" height="8" rx="1" fill={active ? T.primary : 'none'} stroke={active ? T.primary : T.onSurface3} strokeWidth="1.8"/>
      <rect x="10" y="8" width="4" height="13" rx="1" fill={active ? T.primary : 'none'} stroke={active ? T.primary : T.onSurface3} strokeWidth="1.8"/>
      <rect x="16" y="3" width="4" height="18" rx="1" fill={active ? T.primary : 'none'} stroke={active ? T.primary : T.onSurface3} strokeWidth="1.8"/>
    </svg>
  ),
  Settings: (active) => {
    // Gear: outer path with 8 teeth, inner circle cutout
    const c = active ? T.primary : T.onSurface3;
    // Build gear teeth path — 8 teeth, r_outer=10, r_inner=7.5, r_hole=3.5
    const cx = 12, cy = 12;
    const ro = 9.5, ri = 7.2, rh = 3.2;
    const teeth = 8;
    const pts = [];
    for (let i = 0; i < teeth; i++) {
      const a0 = (i / teeth) * Math.PI * 2 - Math.PI / 2;
      const a1 = a0 + (0.25 / teeth) * Math.PI * 2;
      const a2 = a0 + (0.5 / teeth) * Math.PI * 2;
      const a3 = a0 + (0.75 / teeth) * Math.PI * 2;
      pts.push(`${cx + ri * Math.cos(a0)},${cy + ri * Math.sin(a0)}`);
      pts.push(`${cx + ro * Math.cos(a1)},${cy + ro * Math.sin(a1)}`);
      pts.push(`${cx + ro * Math.cos(a2)},${cy + ro * Math.sin(a2)}`);
      pts.push(`${cx + ri * Math.cos(a3)},${cy + ri * Math.sin(a3)}`);
    }
    const gearPath = `M ${pts.join(' L ')} Z`;
    // Hole as a separate circle — use evenodd fill rule to punch it out
    const holeSteps = 32;
    const holePts = [];
    for (let i = 0; i < holeSteps; i++) {
      const a = (i / holeSteps) * Math.PI * 2;
      holePts.push(`${cx + rh * Math.cos(a)},${cy + rh * Math.sin(a)}`);
    }
    const holePath = `M ${holePts.join(' L ')} Z`;
    return (
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d={`${gearPath} ${holePath}`} fill={c} fillRule="evenodd"/>
      </svg>
    );
  },
};

// ─── Crossword Grid ───────────────────────────────────────────────────────────
// Full-width grid for both 5×5 and 15×15
function CrosswordGrid({ size = 15, screenWidth = 390 }) {
  const PAD = 0; // full bleed
  const cellSize = Math.floor(screenWidth / size);
  const gridW = cellSize * size;

  // Generate a plausible-looking grid
  // For 15×15: scatter ~20% black cells in a symmetric pattern
  // For 5×5: the onboarding mock (ACE / _N_ / _D_ / ___ / ___)
  const getCell = (r, c) => {
    if (size === 5) {
      const blacks5 = new Set(['0-3','0-4','1-0','1-1','1-3','1-4','2-0','2-1','2-3','2-4','3-0','3-1','3-2','3-3','3-4','4-0','4-1','4-2','4-3','4-4']);
      if (blacks5.has(`${r}-${c}`)) return 'black';
      const letters5 = {'0-0':'A','0-1':'C','0-2':'E','1-2':'N','2-2':'D'};
      return letters5[`${r}-${c}`] || '';
    }
    // 15×15 symmetric pattern
    const sym = (r + c) % 5 === 0 && (r * c) % 3 === 0;
    const edge = r === 0 || r === size-1 || c === 0 || c === size-1;
    if (!edge && sym && r > 1 && c > 1) return 'black';
    const filled = ['C','R','O','S','S','W','O','R','D','S','O','L','V','E','R'];
    return filled[(r * size + c) % filled.length];
  };

  const blacks15 = new Set();
  if (size === 15) {
    [[1,4],[1,10],[2,7],[3,4],[3,10],[4,1],[4,2],[4,8],[4,12],[4,13],
     [5,5],[5,11],[6,3],[6,9],[7,0],[7,6],[7,8],[7,14],
     [8,5],[8,11],[9,3],[9,9],[10,1],[10,2],[10,6],[10,12],[10,13],
     [11,4],[11,10],[12,7],[13,4],[13,10]].forEach(([r,c]) => {
      blacks15.add(`${r}-${c}`);
      // symmetry
      blacks15.add(`${size-1-r}-${size-1-c}`);
    });
  }

  const isBlack = (r, c) => {
    if (size === 5) {
      // Realistic sparse 5×5 — ~20% black, rotationally symmetric
      // Black squares at: (0,4),(1,2),(2,0),(2,4),(3,2),(4,0)
      const b = new Set(['0-4','1-2','2-0','2-4','3-2','4-0']);
      return b.has(`${r}-${c}`);
    }
    return blacks15.has(`${r}-${c}`);
  };

  const letters15 = {};
  if (size === 15) {
    const words = ['CROSSWORD','SOLVER','CLUE','GRID','PUZZLE','ANSWER','ACROSS','DOWN'];
    let wi = 0;
    for (let r = 0; r < size; r++) {
      for (let c = 0; c < size; c++) {
        if (!blacks15.has(`${r}-${c}`)) {
          letters15[`${r}-${c}`] = words[wi % words.length][(r + c) % words[wi % words.length].length];
          wi++;
        }
      }
    }
  }

  const getLetter = (r, c) => {
    if (size === 5) {
      // Filled letters for the realistic 5×5
      const l = {
        '0-0':'A','0-1':'C','0-2':'E','0-3':'S',
        '1-0':'L','1-1':'O','1-3':'T','1-4':'E',
        '2-1':'N','2-2':'D',
        '3-0':'G','3-1':'E','3-3':'P','3-4':'S',
        '4-1':'R','4-2':'Y','4-3':'E',
      };
      return l[`${r}-${c}`] || '';
    }
    return letters15[`${r}-${c}`] || '';
  };

  // Active cell = (size===5 ? (0,2) : (4,5)), active word across
  const cursorR = size === 5 ? 1 : 4;
  const cursorC = size === 5 ? 1 : 5;

  const isActiveWord = (r, c) => {
    if (size === 5) return r === 1 && c >= 0 && c <= 1; // 1-Across: AL
    return r === cursorR && c >= 3 && c <= 9 && !blacks15.has(`${r}-${c}`);
  };
  const isCrossWord = (r, c) => {
    if (size === 5) return c === 1 && r >= 0 && r <= 2; // 2-Down: CON
    return c === cursorC && r >= 2 && r <= 7 && !blacks15.has(`${r}-${c}`);
  };

  const clueNums15 = {};
  if (size === 15) {
    let n = 1;
    for (let r = 0; r < size; r++) {
      for (let c = 0; c < size; c++) {
        if (blacks15.has(`${r}-${c}`)) continue;
        const startsAcross = c === 0 || blacks15.has(`${r}-${c-1}`);
        const startsDown = r === 0 || blacks15.has(`${r-1}-${c}`);
        if ((startsAcross && c + 1 < size && !blacks15.has(`${r}-${c+1}`)) ||
            (startsDown && r + 1 < size && !blacks15.has(`${r+1}-${c}`))) {
          clueNums15[`${r}-${c}`] = n++;
        }
      }
    }
  }
  const clueNums5 = {'0-0':1,'0-1':2,'0-3':3,'1-0':4,'1-3':5,'2-1':6,'3-0':7,'4-1':8};

  const numSize = Math.max(6, cellSize * 0.22);
  const letterSize = Math.max(10, cellSize * 0.52);

  return (
    <div style={{
      width: gridW, flexShrink: 0,
      border: `2px solid ${T.onSurface}`,
      display: 'grid',
      gridTemplateColumns: `repeat(${size}, ${cellSize}px)`,
      gap: 0,
    }}>
      {Array.from({ length: size * size }).map((_, idx) => {
        const r = Math.floor(idx / size);
        const c = idx % size;
        const black = isBlack(r, c);
        const isCursor = r === cursorR && c === cursorC;
        const wordActive = isActiveWord(r, c);
        const crossActive = isCrossWord(r, c);
        const letter = getLetter(r, c);
        const num = size === 5 ? clueNums5[`${r}-${c}`] : clueNums15[`${r}-${c}`];

        let bg = T.white;
        if (black) bg = T.gridBlack;
        else if (isCursor) bg = T.cellActive;
        else if (wordActive) bg = T.wordHL;
        else if (crossActive) bg = T.crossHL;

        return (
          <div key={idx} style={{
            width: cellSize, height: cellSize, background: bg,
            border: black ? 'none' : `0.5px solid ${T.gridBorder}`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            position: 'relative', flexShrink: 0,
          }}>
            {!black && num && (
              <span style={{
                position: 'absolute', top: 1, left: 1.5,
                fontSize: numSize, fontWeight: 600, lineHeight: 1,
                color: isCursor ? T.onSurface : T.onSurface2,
              }}>{num}</span>
            )}
            {!black && letter && (
              <span style={{
                fontSize: letterSize, fontWeight: 700,
                color: T.onSurface, lineHeight: 1,
                marginTop: size === 15 ? numSize * 0.3 : 0,
              }}>{letter}</span>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── SOLVE (5×5) ──────────────────────────────────────────────────────────────
function SolveScreen5() {
  const W = 390;
  return (

            { n:3, top:620, text:"Share (outlined) → View grid (text) → Next puzzle (filled). Clear hierarchy." },
          ]}>
            <CompletionSheet />
          </Framed>
        </DCArtboard>

      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
