<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crosscue App Icon Concepts</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ─── Color tokens ───────────────────────────────────────────────────────────
const BLUE       = "#1565C0";
const BLUE_LIGHT = "#1E88E5";
const BLUE_DARK  = "#0D47A1";
const BLUE_DEEP  = "#0A2A6E";
const WHITE      = "#FFFFFF";
const OFF_WHITE  = "#F8F6F1";
const BLACK_SQ   = "#111111";
const GOLD       = "oklch(72% 0.18 85)";
const GOLD_DARK  = "oklch(58% 0.20 80)";
const PENCIL_BODY = "oklch(72% 0.18 85)";
const PENCIL_TIP  = "#F5E6C8";

// ─── Shared icon wrapper (Material You adaptive — square with rounded corners) ─
function IconFrame({ size = 200, bg = BLUE, children }) {
  const r = size * 0.22;
  return (
    <svg width={size} height={size} viewBox="0 0 200 200">
      <rect x="0" y="0" width="200" height="200" rx={r} ry={r} fill={bg} />
      {children}
    </svg>
  );
}

// ─── CONCEPT 1: Grid Fragment + Pencil ──────────────────────────────────────
// A crisp 3×3 crossword grid fragment. One cell is black (top-right).
// A bold geometric pencil slashes diagonally from bottom-left to top-right.
function ConceptGridPencil({ size = 200 }) {
  // Grid parameters
  const gx = 30, gy = 38;    // top-left of grid
  const cell = 44;           // cell size
  const stroke = 3.5;
  const cols = 3, rows = 3;
  const gw = cell * cols, gh = cell * rows;

  // Black squares: [row,col] 0-indexed
  const blackCells = [[0,2],[2,0]];
  const isBlack = (r,c) => blackCells.some(([br,bc]) => br===r && bc===c);

  // Pencil: angled from bottom-left to upper-right
  // Pencil body: a rotated rectangle
  const pencilAngle = -38; // degrees
  const pencilLen = 98;
  const pencilW = 16;
  // Center of pencil
  const px = 108, py = 100;

  return (
    <IconFrame size={size} bg={BLUE}>
      {/* Grid cells */}
      {Array.from({length:rows}).map((_,r) =>
        Array.from({length:cols}).map((_,c) => (
          <rect
            key={`${r}-${c}`}
            x={gx + c*cell} y={gy + r*cell}
            width={cell} height={cell}
            fill={isBlack(r,c) ? BLACK_SQ : WHITE}
            stroke={WHITE} strokeWidth={stroke}
          />
        ))
      )}
      {/* Grid outer border */}
      <rect x={gx} y={gy} width={gw} height={gh}
        fill="none" stroke={WHITE} strokeWidth={stroke+0.5} />

      {/* Pencil group — drawn over grid */}
      <g transform={`rotate(${pencilAngle}, ${px}, ${py})`}>
        {/* Pencil body */}
        <rect
          x={px - pencilLen/2} y={py - pencilW/2}
          width={pencilLen} height={pencilW}
          fill={PENCIL_BODY} rx="3"
        />
        {/* Pencil tip (left) */}
        <polygon
          points={`${px - pencilLen/2},${py - pencilW/2}  ${px - pencilLen/2 - 14},${py}  ${px - pencilLen/2},${py + pencilW/2}`}
          fill={PENCIL_TIP}
        />
        {/* Pencil eraser (right) */}
        <rect
          x={px + pencilLen/2 - 1} y={py - pencilW/2}
          width={12} height={pencilW}
          fill="#E8A0A0" rx="2"
        />
        {/* Pencil center line */}
        <line
          x1={px - pencilLen/2} y1={py}
          x2={px + pencilLen/2} y2={py}
          stroke={GOLD_DARK} strokeWidth="1.5" opacity="0.4"
        />
      </g>
    </IconFrame>
  );
}

// ─── CONCEPT 2: 3×3 Crossword Grid In-Progress ──────────────────────────────
// A 3×3 crossword grid on deep navy. Two black squares, white filled cells
// with letters, and a highlighted top row (active word in blue).
function ConceptCrossPencil({ size = 200 }) {
  const PAD = 26;
  const GRID = 200 - PAD * 2;
  const cell = GRID / 3;
  const stroke = 3;

  // cell states: 'black' | 'empty' | 'active'
  const gridState = [
    ['empty',  'black',  'empty'],
    ['active', 'active', 'active'],
    ['empty',  'empty',  'black' ],
  ];

  const letters = [
    ['', '',  ''],
    ['C', 'U', 'E'],
    ['', '',  '' ],
  ];

  const cellColor = (state) => {
    if (state === 'black')  return BLACK_SQ;
    if (state === 'active') return BLUE_LIGHT;
    return WHITE; // empty
  };

  const letterColor = (state) => state === 'active' ? WHITE : BLUE_DARK;
  const fontSize = cell * 0.52;

  return (
    <IconFrame size={size} bg={BLUE_DEEP}>
      {gridState.map((row, r) =>
        row.map((state, c) => {
          const x = PAD + c * cell;
          const y = PAD + r * cell;
          const letter = letters[r][c];
          return (
            <g key={`${r}-${c}`}>
              <rect
                x={x} y={y} width={cell} height={cell}
                fill={cellColor(state)}
                stroke="rgba(255,255,255,0.22)"
                strokeWidth={stroke}
              />
              {letter && state !== 'black' && (
                <text
                  x={x + cell / 2}
                  y={y + cell / 2 + fontSize * 0.36}
                  textAnchor="middle"
                  fontSize={fontSize}
                  fontFamily="Helvetica Neue, Helvetica, Arial, sans-serif"
                  fontWeight="700"
                  fill={letterColor(state)}
                  letterSpacing="-1"
                >{letter}</text>
              )}
              {state !== 'black' && (() => {
                const clueNums = { '0-0': 1, '0-2': 2, '1-0': 3, '2-0': 4 };
                const num = clueNums[`${r}-${c}`];
                if (!num) return null;
                const numSize = cell * 0.22;
                const numColor = state === 'active' ? 'rgba(255,255,255,0.85)' : 'rgba(30,60,120,0.75)';
                return (
                  <text
                    key="num"
                    x={x + numSize * 0.55}
                    y={y + numSize * 1.1}
                    fontSize={numSize}
                    fontFamily="Helvetica Neue, Helvetica, Arial, sans-serif"
                    fontWeight="600"
                    fill={numColor}
                  >{num}</text>
                );
              })()}
            </g>
          );
        })
      )}
      {/* Outer border */}
      <rect
        x={PAD} y={PAD} width={GRID} height={GRID}
        fill="none"
        stroke="rgba(255,255,255,0.55)"
        strokeWidth={stroke + 1}
      />
    </IconFrame>
  );
}

// ─── CONCEPT 3: Big C Cell + Pencil ─────────────────────────────────────────
// A single oversized crossword square — white fill, bold blue border.
// The cell number "1" sits at top-left (classic crossword convention).
// A chunky gold pencil tucked in the bottom-right corner, emerging diagonally.
// Background: very dark blue for contrast.
function ConceptCCell({ size = 200 }) {
  // Single cell
  const cellX = 28, cellY = 32, cellW = 120, cellH = 120;
  const borderW = 7;

  // Pencil in bottom-right, angled 45°
  const pAngle = -40;
  const pLen = 90, pW = 18;
  const ppx = 153, ppy = 152;

  return (
    <IconFrame size={size} bg={BLUE_DARK}>
      {/* Cell background */}
      <rect
        x={cellX} y={cellY} width={cellW} height={cellH}
        fill={OFF_WHITE}
      />
      {/* Cell border */}
      <rect
        x={cellX} y={cellY} width={cellW} height={cellH}
        fill="none" stroke={WHITE} strokeWidth={borderW}
      />

      {/* Clue number — top-left */}
      <text
        x={cellX + 9} y={cellY + 22}
        fill={BLACK_SQ} fontSize="17" fontFamily="Helvetica Neue, Helvetica, Arial, sans-serif"
        fontWeight="700" letterSpacing="-0.5"
      >1</text>

      {/* Letter in cell — bold C for Crosscue */}
      <text
        x={cellX + cellW/2 + 1} y={cellY + cellH/2 + 28}
        fill={BLUE} fontSize="82"
        fontFamily="Helvetica Neue, Helvetica, Arial, sans-serif"
        fontWeight="700"
        textAnchor="middle"
        letterSpacing="-4"
      >C</text>

      {/* Pencil — over bottom-right corner of cell */}
      <g transform={`rotate(${pAngle}, ${ppx}, ${ppy})`}>
        <rect x={ppx - pLen/2} y={ppy - pW/2} width={pLen} height={pW} fill={PENCIL_BODY} rx="3" />
        <polygon
          points={`${ppx - pLen/2},${ppy - pW/2}  ${ppx - pLen/2 - 16},${ppy}  ${ppx - pLen/2},${ppy + pW/2}`}
          fill={PENCIL_TIP}
        />
        <rect x={ppx + pLen/2 - 1} y={ppy - pW/2} width={13} height={pW} fill="#E8A0A0" rx="2.5" />
        <line
          x1={ppx - pLen/2} y1={ppy}
          x2={ppx + pLen/2} y2={ppy}
          stroke={GOLD_DARK} strokeWidth="1.5" opacity="0.4"
        />
      </g>
    </IconFrame>
  );
}

// ─── Preview sizes to show adaptive behavior ─────────────────────────────────
function IconShowcase({ label, children }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 20 }}>
      <div style={{ color: '#888', fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', fontFamily: 'Helvetica Neue, Helvetica, sans-serif' }}>{label}</div>
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 16 }}>
        {/* 512 full */}
        <div style={{ width: 200, height: 200, filter: 'drop-shadow(0 4px 24px rgba(0,0,0,0.45))' }}>
          {React.cloneElement(children, { size: 200 })}
        </div>
        {/* Sizes row */}
        <div style={{ display: 'flex', alignItems: 'flex-end', gap: 10 }}>
          {[80, 56, 40, 28].map(s => (
            <div key={s} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
              <div style={{ filter: 'drop-shadow(0 2px 8px rgba(0,0,0,0.4))' }}>
                {React.cloneElement(children, { size: s })}
              </div>
              <span style={{ color: '#555', fontSize: 9, fontFamily: 'Helvetica Neue, Helvetica, sans-serif' }}>{s}px</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas title="Crosscue — App Icon Concepts">
      <DCSection id="concepts" title="App Icon Concepts">
        <DCArtboard id="concept1" label="① Grid Fragment + Pencil" width={320} height={420}>
          <div style={{ width: '100%', height: '100%', background: '#F0EDE8', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 24, gap: 20 }}>
            <IconShowcase label="Grid Fragment + Pencil">
              <ConceptGridPencil />
            </IconShowcase>
            <p style={{ fontSize: 12, color: '#666', textAlign: 'center', maxWidth: 220, lineHeight: 1.5, fontFamily: 'Helvetica Neue, Helvetica, sans-serif' }}>
              Classic 3×3 grid fragment with two black squares. Gold pencil slashes diagonally — energy + craft.
            </p>
          </div>
        </DCArtboard>

        <DCArtboard id="concept2" label="② 3×3 Grid In-Progress" width={320} height={420}>
          <div style={{ width: '100%', height: '100%', background: '#F0EDE8', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 24, gap: 20 }}>
            <IconShowcase label="3×3 Grid In-Progress">
              <ConceptCrossPencil />
            </IconShowcase>
            <p style={{ fontSize: 12, color: '#666', textAlign: 'center', maxWidth: 220, lineHeight: 1.5, fontFamily: 'Helvetica Neue, Helvetica, sans-serif' }}>
              3×3 crossword grid on deep navy. Two black squares, empty white cells, middle row "CUE" highlighted in blue — mid-solve.
            </p>
          </div>
        </DCArtboard>

        <DCArtboard id="concept3" label="③ Letter Cell + Pencil" width={320} height={420}>
          <div style={{ width: '100%', height: '100%', background: '#F0EDE8', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 24, gap: 20 }}>
            <IconShowcase label="Letter Cell + Pencil">
              <ConceptCCell />
            </IconShowcase>
            <p style={{ fontSize: 12, color: '#666', textAlign: 'center', maxWidth: 220, lineHeight: 1.5, fontFamily: 'Helvetica Neue, Helvetica, sans-serif' }}>
              One oversized crossword cell with clue "1" and the letter C. Gold pencil emerges from corner — wordplay + identity.
            </p>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="onphone" title="On-Device Preview (Android)">
        <DCArtboard id="phone-preview" label="Android Home Screen" width={480} height={280}>
          <div style={{ width: '100%', height: '100%', background: '#1C1C1E', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 32, padding: 28 }}>
            {[
              { Comp: ConceptGridPencil, name: 'Crosscue' },
              { Comp: ConceptCrossPencil, name: 'Crosscue' },
              { Comp: ConceptCCell, name: 'Crosscue' },
            ].map(({ Comp, name }, i) => (
              <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
                <div style={{ width: 68, height: 68, borderRadius: 16, overflow: 'hidden', filter: 'drop-shadow(0 3px 12px rgba(0,0,0,0.6))' }}>
                  <Comp size={68} />
                </div>
                <span style={{ color: 'white', fontSize: 11, fontFamily: 'Helvetica Neue, Helvetica, sans-serif', letterSpacing: '-0.01em' }}>{name}</span>
              </div>
            ))}
          </div>
        </DCArtboard>

        <DCArtboard id="splash-preview" label="Splash Screen Preview" width={220} height={280}>
          <div style={{ width: '100%', height: '100%', background: BLUE, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
            {/* Concept 1 on splash — most recognizable on solid blue */}
            <ConceptGridPencil size={88} />
            <span style={{ color: 'rgba(255,255,255,0.7)', fontSize: 13, letterSpacing: '0.18em', fontFamily: 'Helvetica Neue, Helvetica, sans-serif', textTransform: 'uppercase', fontWeight: 500 }}>crosscue</span>
          </div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
